<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MilkMaster</title>
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    
    <!-- Preconnects -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://firestore.googleapis.com">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="manifest" id="app-manifest" href="/manifest-admin.json">
    <script>
      (function() {
        var path = window.location.pathname.toLowerCase();
        var manifestFile = '/manifest-admin.json';
        if (path.includes('/farmer')) manifestFile = '/manifest-farmer.json';
        else if (path.includes('/customer')) manifestFile = '/manifest-customer.json';
        
        document.getElementById('app-manifest').href = manifestFile;
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <style>
        .app-loader { display: flex; justify-content: center; align-items: center; height: 100vh; background: #f8fafc; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
      </style>
      <div class="app-loader">
        <div class="spinner"></div>
      </div>
    </div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        console.log('UNCAUGHT ERROR:', msg, 'at', url, ':', line, ':', col);
        if (msg.includes('fetch')) {
          console.log('DEBUG: window.fetch property descriptor:', Object.getOwnPropertyDescriptor(window, 'fetch'));
        }
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
