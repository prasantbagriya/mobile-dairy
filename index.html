<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MilkMaster - Dairy Management ERP</title>
    <meta name="description" content="MilkMaster - Comprehensive Digital Dairy Management ERP">
    <meta property="og:title" content="MilkMaster - Dairy Management ERP">
    <meta property="og:description" content="Comprehensive Digital Dairy Management ERP for farmers and customers.">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    
    <!-- Suppress Vite connecting and App Check logs -->
    <script>
      const originalDebug = console.debug;
      const originalInfo = console.info;
      const originalLog = console.log;
      
      console.debug = function(...args) {
        if (typeof args[0] === 'string' && args[0].includes('[vite]')) return;
        originalDebug.apply(console, args);
      };
      
      const checkAppCheckLog = function(...args) {
        if (typeof args[0] === 'string' && args[0].includes('App Check debug token:')) return true;
        return false;
      };
      
      console.info = function(...args) {
        if (checkAppCheckLog(...args)) return;
        originalInfo.apply(console, args);
      };
      
      console.log = function(...args) {
        if (checkAppCheckLog(...args)) return;
        originalLog.apply(console, args);
      };
    </script>
    
    <!-- Preconnects -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://firestore.googleapis.com">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="manifest" id="app-manifest" href="/manifest-admin.json">
    <script>
      (function() {
        var path = window.location.pathname.toLowerCase();
        var manifestFile = '/manifest-admin.json';
        if (path.includes('/farmer')) manifestFile = '/manifest-farmer.json';
        else if (path.includes('/customer')) manifestFile = '/manifest-customer.json';
        
        document.getElementById('app-manifest').href = manifestFile;
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <style>
        .app-loader { display: flex; justify-content: center; align-items: center; height: 100vh; background: #f8fafc; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
      </style>
      <div class="app-loader">
        <div class="spinner"></div>
      </div>
    </div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        console.log('UNCAUGHT ERROR:', msg, 'at', url, ':', line, ':', col);
        if (msg.includes('fetch')) {
          console.log('DEBUG: window.fetch property descriptor:', Object.getOwnPropertyDescriptor(window, 'fetch'));
        }
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
